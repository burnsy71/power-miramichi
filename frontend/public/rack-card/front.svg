<!-- Rack card FRONT: 4.25" × 9.25" full-bleed (4" × 9" trim, 0.125" bleed).
     Rendered at 300 DPI → 1275 × 2775 pixels.
     Safe zone starts at 112.5px from edge (0.375" = 0.125 bleed + 0.25 safe). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1275 2775" width="4.25in" height="9.25in">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E392A"/>
      <stop offset="100%" stop-color="#0F2618"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1275" height="2775" fill="url(#bg)"/>

  <!-- Top/bottom accent bars (gold + orange) inside trim -->
  <rect x="0" y="0" width="1275" height="18" fill="#E2AA54"/>
  <rect x="0" y="2757" width="1275" height="18" fill="#CC5A37"/>

  <!-- Content shifted up 110px for vertical centering -->
  <g transform="translate(0, -110)">

  <!-- KICKER -->
  <text x="637" y="340" text-anchor="middle"
        font-family="'Outfit','Inter',sans-serif" font-size="56" font-weight="600"
        letter-spacing="24" fill="#E2AA54">MIRAMICHI</text>

  <!-- Shield / crest -->
  <g transform="translate(437, 430)">
    <path d="M 200 0 L 400 0 L 400 260 Q 400 480 200 540 Q 0 480 0 260 L 0 0 Z"
          fill="#1E392A" stroke="#E2AA54" stroke-width="6"/>
    <path d="M 200 24 L 376 24 L 376 260 Q 376 460 200 514 Q 24 460 24 260 L 24 24 Z"
          fill="none" stroke="#E2AA54" stroke-width="2" opacity="0.6"/>
    <text x="200" y="220" text-anchor="middle"
          font-family="'Playfair Display','Georgia',serif" font-size="240" font-weight="700"
          fill="#E2AA54">P</text>
    <line x1="60" y1="280" x2="340" y2="280" stroke="#CC5A37" stroke-width="4"/>
    <text x="200" y="340" text-anchor="middle"
          font-family="'Outfit','Inter',sans-serif" font-size="38" font-weight="700"
          letter-spacing="10" fill="#E2AA54">POWER</text>
    <text x="200" y="395" text-anchor="middle"
          font-family="'Outfit','Inter',sans-serif" font-size="28" font-weight="500"
          letter-spacing="10" fill="#E2AA54">FOR MAYOR</text>
  </g>

  <!-- SHAWN -->
  <text x="637" y="1140" text-anchor="middle"
        font-family="'Outfit','Inter',sans-serif" font-size="52" font-weight="500"
        letter-spacing="26" fill="#FDFCF8">SHAWN</text>

  <!-- POWER (oversized serif) -->
  <text x="637" y="1380" text-anchor="middle"
        font-family="'Playfair Display','Georgia',serif" font-size="240" font-weight="700"
        fill="#FDFCF8">POWER</text>

  <!-- Divider -->
  <line x1="490" y1="1430" x2="784" y2="1430" stroke="#E2AA54" stroke-width="4"/>

  <!-- FOR MAYOR -->
  <text x="637" y="1510" text-anchor="middle"
        font-family="'Outfit','Inter',sans-serif" font-size="52" font-weight="700"
        letter-spacing="22" fill="#E2AA54">FOR MAYOR</text>

  <!-- Tagline -->
  <text x="637" y="1780" text-anchor="middle"
        font-family="'Playfair Display','Georgia',serif" font-size="42" font-style="italic"
        font-weight="400" fill="#FDFCF8" opacity="0.92">The time for debate has passed.</text>
  <text x="637" y="1842" text-anchor="middle"
        font-family="'Playfair Display','Georgia',serif" font-size="42" font-style="italic"
        font-weight="700" fill="#E2AA54">The time for action is now.</text>

  <!-- Vote box -->
  <g transform="translate(237, 2010)">
    <rect x="0" y="0" width="800" height="220" rx="14"
          fill="none" stroke="#E2AA54" stroke-width="4"/>
    <text x="400" y="88" text-anchor="middle"
          font-family="'Outfit','Inter',sans-serif" font-size="44" font-weight="500"
          letter-spacing="14" fill="#FDFCF8">VOTE</text>
    <text x="400" y="174" text-anchor="middle"
          font-family="'Playfair Display','Georgia',serif" font-size="74" font-weight="700"
          fill="#E2AA54">SHAWN POWER</text>
  </g>

  <!-- QR code with caption -->
  <g transform="translate(510, 2290)">
    <rect x="-10" y="-10" width="275" height="275" fill="#FDFCF8" rx="8"/>
    <image href="qr.png" x="0" y="0" width="255" height="255"/>
  </g>
  <text x="637" y="2622" text-anchor="middle"
        font-family="'Outfit','Inter',sans-serif" font-size="28" font-weight="500"
        letter-spacing="4" fill="#FDFCF8" opacity="0.8">Scan to learn more</text>
  <text x="637" y="2690" text-anchor="middle"
        font-family="'Outfit','Inter',sans-serif" font-size="38" font-weight="700"
        letter-spacing="4" fill="#E2AA54">www.PowerForMayor.ca</text>

  </g>
</svg>
