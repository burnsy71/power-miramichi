<!-- Rack card BACK: 4.25" × 9.25" full-bleed, 300 DPI → 1275 × 2775 px.
     Font sizes pushed up for elderly readability. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1275 2775" width="4.25in" height="9.25in">

  <defs>
    <clipPath id="portraitClip">
      <circle cx="637" cy="1820" r="180"/>
    </clipPath>
  </defs>

  <!-- Full-bleed cream background -->
  <rect width="1275" height="2775" fill="#FDFCF8"/>

  <!-- Top dark header band (full-bleed) -->
  <rect x="0" y="0" width="1275" height="260" fill="#1E392A"/>
  <rect x="0" y="260" width="1275" height="12" fill="#E2AA54"/>

  <!-- Header text -->
  <text x="637" y="140" text-anchor="middle"
        font-family="'Playfair Display','Georgia',serif" font-size="74" font-weight="700"
        fill="#FDFCF8">SHAWN POWER</text>
  <text x="637" y="215" text-anchor="middle"
        font-family="'Outfit','Inter',sans-serif" font-size="32" font-weight="600"
        letter-spacing="14" fill="#E2AA54">FOR MAYOR · MIRAMICHI</text>

  <!-- Intro quote — centered -->
  <text x="637" y="390" text-anchor="middle" font-family="'Playfair Display','Georgia',serif"
        font-size="46" font-style="italic" font-weight="400" fill="#1E392A">I'm not a career politician —</text>
  <text x="637" y="456" text-anchor="middle" font-family="'Playfair Display','Georgia',serif"
        font-size="46" font-style="italic" font-weight="700" fill="#1E392A">I'm your neighbour.</text>
  <line x1="537" y1="504" x2="737" y2="504" stroke="#E2AA54" stroke-width="3"/>

  <!-- Bio paragraph — bigger, centered, 4 lines -->
  <g font-family="'Outfit','Inter',sans-serif" font-size="36" fill="#1E392A" opacity="0.85"
     text-anchor="middle">
    <text x="637" y="600">A proud father, grandfather, and husband</text>
    <text x="637" y="650">to Margie. An Electrical Engineering Technologist</text>
    <text x="637" y="700">who spent 21 years solving real problems at</text>
    <text x="637" y="750">Repap/UPM — ready to do the same at City Hall.</text>
  </g>

  <!-- Section divider -->
  <line x1="137" y1="820" x2="1138" y2="820" stroke="#E2AA54" stroke-width="2" opacity="0.6"/>

  <!-- Platform header -->
  <text x="637" y="885" text-anchor="middle"
        font-family="'Outfit','Inter',sans-serif" font-size="26"
        font-weight="600" letter-spacing="10" fill="#CC5A37">THE PLATFORM</text>
  <text x="637" y="950" text-anchor="middle"
        font-family="'Playfair Display','Georgia',serif" font-size="48"
        font-weight="700" fill="#1E392A">Real plans for Miramichi.</text>

  <!-- Platform items — bigger fonts, balanced horizontally -->
  <g transform="translate(112, 1020)" font-family="'Outfit','Inter',sans-serif">
    <g transform="translate(0, 0)">
      <circle cx="30" cy="30" r="30" fill="#1E392A"/>
      <text x="30" y="43" text-anchor="middle" font-size="30" font-weight="700" fill="#E2AA54">1</text>
      <text x="92" y="26" font-size="34" font-weight="700" fill="#1E392A">In-house Planning Commission</text>
      <text x="92" y="70" font-size="28" fill="#1E392A" opacity="0.78">Works for residents, not against them.</text>
    </g>
    <g transform="translate(0, 125)">
      <circle cx="30" cy="30" r="30" fill="#1E392A"/>
      <text x="30" y="43" text-anchor="middle" font-size="30" font-weight="700" fill="#E2AA54">2</text>
      <text x="92" y="26" font-size="34" font-weight="700" fill="#1E392A">Your Tax Dollars</text>
      <text x="92" y="70" font-size="28" fill="#1E392A" opacity="0.78">All spending scrutinized — increases held down.</text>
    </g>
    <g transform="translate(0, 250)">
      <circle cx="30" cy="30" r="30" fill="#1E392A"/>
      <text x="30" y="43" text-anchor="middle" font-size="30" font-weight="700" fill="#E2AA54">3</text>
      <text x="92" y="26" font-size="34" font-weight="700" fill="#1E392A">Protect Veterans' Memorials</text>
      <text x="92" y="70" font-size="28" fill="#1E392A" opacity="0.78">A bylaw to honour them — forever.</text>
    </g>
    <g transform="translate(0, 375)">
      <circle cx="30" cy="30" r="30" fill="#1E392A"/>
      <text x="30" y="43" text-anchor="middle" font-size="30" font-weight="700" fill="#E2AA54">4</text>
      <text x="92" y="26" font-size="34" font-weight="700" fill="#1E392A">A New Northern Street</text>
      <text x="92" y="70" font-size="28" fill="#1E392A" opacity="0.78">Relief for north-end drivers in one season.</text>
    </g>
    <g transform="translate(0, 500)">
      <circle cx="30" cy="30" r="30" fill="#1E392A"/>
      <text x="30" y="43" text-anchor="middle" font-size="30" font-weight="700" fill="#E2AA54">5</text>
      <text x="92" y="26" font-size="34" font-weight="700" fill="#1E392A">Centennial Bridge Shuttle</text>
      <text x="92" y="70" font-size="28" fill="#1E392A" opacity="0.78">Free bus crossings — a $50M saving.</text>
    </g>
  </g>

  <!-- Portrait: smaller + nudged down so it clears platform item 5 -->
  <image href="shawn-headshot.jpg" x="457" y="1640" width="360" height="564"
         preserveAspectRatio="xMidYMin slice" clip-path="url(#portraitClip)"/>
  <circle cx="637" cy="1820" r="180" fill="none" stroke="#E2AA54" stroke-width="4"/>
  <circle cx="637" cy="1820" r="187" fill="none" stroke="#1E392A" stroke-width="1" opacity="0.2"/>
  <text x="637" y="2050" text-anchor="middle"
        font-family="'Outfit','Inter',sans-serif" font-size="26" font-weight="600"
        letter-spacing="10" fill="#CC5A37">MEET SHAWN</text>

  <!-- Contact block — bigger type -->
  <g transform="translate(0, 2110)">
    <line x1="137" y1="0" x2="1138" y2="0" stroke="#E2AA54" stroke-width="2" opacity="0.6"/>

    <text x="637" y="68" text-anchor="middle"
          font-family="'Outfit','Inter',sans-serif" font-size="28" font-weight="600"
          letter-spacing="10" fill="#CC5A37">GET IN TOUCH</text>

    <!-- QR on left -->
    <g transform="translate(170, 120)">
      <rect x="0" y="0" width="220" height="220" fill="#FDFCF8" stroke="#1E392A" stroke-width="2"/>
      <image href="qr.png" x="10" y="10" width="200" height="200"/>
      <text x="110" y="258" text-anchor="middle" font-family="'Outfit','Inter',sans-serif"
            font-size="22" fill="#1E392A" opacity="0.75">Scan or visit</text>
    </g>

    <!-- Contact text, big -->
    <g transform="translate(460, 150)" font-family="'Outfit','Inter',sans-serif" fill="#1E392A">
      <text x="0" y="0" font-size="38" font-weight="700">www.PowerForMayor.ca</text>
      <text x="0" y="64" font-size="34" font-weight="700" fill="#CC5A37">506-778-9410</text>
      <text x="0" y="116" font-size="30">powerformayor@gmail.com</text>
      <text x="0" y="178" font-size="22" opacity="0.7">FACEBOOK</text>
      <text x="0" y="214" font-size="26" font-weight="600">Shawn Power for Mayor</text>
    </g>
  </g>

  <!-- Authorized-by line -->
  <text x="637" y="2730" text-anchor="middle"
        font-family="'Outfit','Inter',sans-serif" font-size="18"
        fill="#1E392A" opacity="0.55">Authorized by the official agent for the Shawn Power campaign.</text>

  <!-- Accent bottom band -->
  <rect x="0" y="2757" width="1275" height="18" fill="#CC5A37"/>
</svg>
