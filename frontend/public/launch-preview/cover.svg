<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 859" width="1640" height="859">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E392A"/>
      <stop offset="100%" stop-color="#0F2618"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1640" height="859" fill="url(#bg)"/>

  <!-- Top/bottom accent bars -->
  <rect x="0" y="0" width="1640" height="4" fill="#E2AA54"/>
  <rect x="0" y="855" width="1640" height="4" fill="#CC5A37"/>

  <!-- Shield crest on right, wordmark on left -->
  <g transform="translate(1180, 180)">
    <!-- Shield outer -->
    <path d="M 160 0 L 320 0 L 320 200 Q 320 380 160 420 Q 0 380 0 200 L 0 0 Z" fill="#1E392A" stroke="#E2AA54" stroke-width="4"/>
    <!-- Shield inner outline -->
    <path d="M 160 22 L 300 22 L 300 200 Q 300 365 160 398 Q 20 365 20 200 L 20 22 Z" fill="none" stroke="#E2AA54" stroke-width="1.5" opacity="0.6"/>
    <!-- Center "P" -->
    <text x="160" y="200" text-anchor="middle" font-family="'Playfair Display','Georgia',serif" font-size="180" font-weight="700" fill="#E2AA54">P</text>
    <!-- Divider line in shield -->
    <line x1="50" y1="230" x2="270" y2="230" stroke="#CC5A37" stroke-width="3"/>
    <!-- Shield tagline -->
    <text x="160" y="275" text-anchor="middle" font-family="'Outfit','Inter',sans-serif" font-size="26" font-weight="700" letter-spacing="8" fill="#E2AA54">POWER</text>
    <text x="160" y="310" text-anchor="middle" font-family="'Outfit','Inter',sans-serif" font-size="18" font-weight="500" letter-spacing="6" fill="#E2AA54">FOR MAYOR</text>
    <text x="160" y="358" text-anchor="middle" font-family="'Outfit','Inter',sans-serif" font-size="18" font-weight="600" letter-spacing="6" fill="#CC5A37">MIRAMICHI</text>
  </g>

  <!-- Content on left (safe zone: x from 200) -->
  <g transform="translate(200, 250)">
    <rect x="0" y="0" width="56" height="4" fill="#E2AA54"/>
    <text x="76" y="8" font-family="'Outfit','Inter',sans-serif" font-size="22" font-weight="600" letter-spacing="8" fill="#E2AA54">NEW BRUNSWICK</text>
  </g>

  <!-- SHAWN -->
  <text x="200" y="360" font-family="'Outfit','Inter',sans-serif" font-size="34" font-weight="500" letter-spacing="16" fill="#FDFCF8">SHAWN</text>
  <!-- POWER big -->
  <text x="200" y="510" font-family="'Playfair Display','Georgia',serif" font-size="180" font-weight="700" fill="#FDFCF8">POWER</text>
  <!-- Divider -->
  <line x1="200" y1="555" x2="320" y2="555" stroke="#E2AA54" stroke-width="3"/>
  <!-- FOR MAYOR -->
  <text x="200" y="600" font-family="'Outfit','Inter',sans-serif" font-size="26" font-weight="600" letter-spacing="14" fill="#E2AA54">FOR MAYOR · MIRAMICHI</text>

  <!-- Tagline -->
  <text x="200" y="680" font-family="'Playfair Display','Georgia',serif" font-size="28" font-style="italic" font-weight="400" fill="#FDFCF8" opacity="0.9">The time for debate has passed.</text>
  <text x="200" y="718" font-family="'Playfair Display','Georgia',serif" font-size="28" font-style="italic" font-weight="700" fill="#E2AA54">The time for action is now.</text>

  <!-- URL -->
  <text x="200" y="790" font-family="'Outfit','Inter',sans-serif" font-size="22" font-weight="500" letter-spacing="6" fill="#E2AA54">powerformayor.ca</text>
</svg>
