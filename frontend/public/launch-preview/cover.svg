<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 859" width="1640" height="859">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E392A"/>
      <stop offset="100%" stop-color="#0F2618"/>
    </linearGradient>
    <!-- Fade at bottom so profile pic overlap blends smoothly -->
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(15,38,24,0)"/>
      <stop offset="100%" stop-color="rgba(15,38,24,0.8)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1640" height="859" fill="url(#bg)"/>

  <!-- Accent lines -->
  <rect x="0" y="0" width="1640" height="4" fill="#E2AA54"/>
  <rect x="0" y="855" width="1640" height="4" fill="#CC5A37"/>

  <!-- All critical content lives in upper 550px of the canvas. The bottom 300px
       is intentionally decorative/empty, because on mobile FB crops the cover
       and the profile picture overlaps the bottom-left heavily. -->

  <!-- Kicker -->
  <text x="820" y="120" text-anchor="middle" font-family="'Outfit','Inter',sans-serif" font-size="20" font-weight="600" letter-spacing="10" fill="#E2AA54">MIRAMICHI · NEW BRUNSWICK</text>

  <!-- SHAWN -->
  <text x="820" y="200" text-anchor="middle" font-family="'Outfit','Inter',sans-serif" font-size="32" font-weight="500" letter-spacing="22" fill="#FDFCF8">SHAWN</text>

  <!-- POWER (oversized serif) -->
  <text x="820" y="360" text-anchor="middle" font-family="'Playfair Display','Georgia',serif" font-size="170" font-weight="700" fill="#FDFCF8">POWER</text>

  <!-- Divider -->
  <line x1="740" y1="400" x2="900" y2="400" stroke="#E2AA54" stroke-width="3"/>

  <!-- FOR MAYOR -->
  <text x="820" y="448" text-anchor="middle" font-family="'Outfit','Inter',sans-serif" font-size="24" font-weight="600" letter-spacing="14" fill="#E2AA54">FOR MAYOR · MIRAMICHI</text>

  <!-- Tagline -->
  <text x="820" y="525" text-anchor="middle" font-family="'Playfair Display','Georgia',serif" font-size="26" font-style="italic" font-weight="400" fill="#FDFCF8" opacity="0.92">The time for debate has passed.</text>
  <text x="820" y="565" text-anchor="middle" font-family="'Playfair Display','Georgia',serif" font-size="26" font-style="italic" font-weight="700" fill="#E2AA54">The time for action is now.</text>

  <!-- Decorative fade at bottom so profile pic overlap looks intentional -->
  <rect x="0" y="600" width="1640" height="259" fill="url(#bottomFade)"/>

  <!-- URL small, top-right (out of profile-pic overlap zone on both desktop and mobile) -->
  <text x="1580" y="60" text-anchor="end" font-family="'Outfit','Inter',sans-serif" font-size="18" font-weight="500" letter-spacing="4" fill="#E2AA54" opacity="0.75">powerformayor.ca</text>
</svg>
