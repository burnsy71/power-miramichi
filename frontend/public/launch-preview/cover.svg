<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 859" width="1640" height="859">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E392A"/>
      <stop offset="100%" stop-color="#152A1F"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(30,57,42,0.98)"/>
      <stop offset="65%" stop-color="rgba(30,57,42,0.85)"/>
      <stop offset="100%" stop-color="rgba(30,57,42,0.55)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1640" height="859" fill="url(#bg)"/>

  <!-- Subtle gold accent line, top -->
  <rect x="0" y="0" width="1640" height="4" fill="#E2AA54"/>
  <rect x="0" y="855" width="1640" height="4" fill="#CC5A37"/>

  <!-- Content in safe zone (centered around 820, visible on mobile 640-wide crop) -->
  <!-- Safe zone: x from 200 to 1442 (1242 wide), y from 190 to 670 -->

  <!-- Kicker -->
  <g transform="translate(200, 250)">
    <rect x="0" y="0" width="56" height="4" fill="#E2AA54"/>
    <text x="76" y="8" font-family="'Outfit','Inter',sans-serif" font-size="22" font-weight="600" letter-spacing="8" fill="#E2AA54">MIRAMICHI · NEW BRUNSWICK</text>
  </g>

  <!-- Small name line -->
  <text x="200" y="330" font-family="'Outfit','Inter',sans-serif" font-size="32" font-weight="500" letter-spacing="14" fill="#FDFCF8">SHAWN</text>

  <!-- Giant POWER -->
  <text x="200" y="500" font-family="'Outfit','Inter',sans-serif" font-size="200" font-weight="800" letter-spacing="-4" fill="#CC5A37">POWER</text>

  <!-- Tagline -->
  <text x="200" y="560" font-family="'Outfit','Inter',sans-serif" font-size="24" font-weight="600" letter-spacing="14" fill="#FDFCF8">FOR MAYOR</text>

  <!-- Divider and quote -->
  <line x1="200" y1="610" x2="320" y2="610" stroke="#E2AA54" stroke-width="3"/>
  <text x="200" y="660" font-family="'Playfair Display','Georgia',serif" font-size="32" font-style="italic" font-weight="400" fill="#FDFCF8" opacity="0.9">The time for debate has passed.</text>
  <text x="200" y="702" font-family="'Playfair Display','Georgia',serif" font-size="32" font-style="italic" font-weight="700" fill="#E2AA54">The time for action is now.</text>

  <!-- URL bottom -->
  <text x="200" y="790" font-family="'Outfit','Inter',sans-serif" font-size="22" font-weight="500" letter-spacing="6" fill="#E2AA54">powerformayor.ca</text>

  <!-- Logo mark on right (option 4 energy bars, scaled up) -->
  <g transform="translate(1340, 260)">
    <rect x="0"  y="120" width="30" height="180" rx="4" fill="#1E392A" stroke="#E2AA54" stroke-width="2"/>
    <rect x="50" y="60"  width="30" height="240" rx="4" fill="#CC5A37"/>
    <rect x="100" y="0"   width="30" height="300" rx="4" fill="#E2AA54"/>
  </g>
</svg>
