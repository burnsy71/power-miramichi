<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <!-- Stylized Miramichi bridge silhouette (Centennial Bridge arches) -->
  <g transform="translate(120, 20)" fill="#CC5A37">
    <!-- Three arches representing the cable-stayed bridge pylons -->
    <path d="M 0 70 L 60 10 L 120 70 L 180 10 L 240 70 L 300 10 L 360 70 Z" fill="none" stroke="#CC5A37" stroke-width="3" stroke-linejoin="round"/>
    <!-- Deck line -->
    <rect x="0" y="72" width="360" height="4" fill="#1E392A"/>
    <!-- Water ripples below -->
    <path d="M 0 88 Q 40 82 80 88 T 160 88 T 240 88 T 320 88 T 400 88" fill="none" stroke="#E2AA54" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <path d="M 0 100 Q 40 94 80 100 T 160 100 T 240 100 T 320 100 T 400 100" fill="none" stroke="#E2AA54" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Wordmark -->
  <g transform="translate(0, 140)">
    <text x="300" y="30" text-anchor="middle" font-family="Outfit, sans-serif" font-size="16" font-weight="500" letter-spacing="10" fill="#1E392A">SHAWN</text>
    <text x="300" y="82" text-anchor="middle" font-family="Playfair Display, Georgia, serif" font-size="54" font-weight="700" fill="#1E392A">POWER</text>
  </g>
  <text x="300" y="215" text-anchor="middle" font-family="Outfit, sans-serif" font-size="12" font-weight="500" letter-spacing="8" fill="#CC5A37">FOR MAYOR · MIRAMICHI</text>
</svg>
