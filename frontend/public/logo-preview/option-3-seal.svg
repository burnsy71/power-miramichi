<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <!-- Circular seal -->
  <g transform="translate(100, 10)">
    <circle cx="100" cy="100" r="95" fill="#1E392A"/>
    <circle cx="100" cy="100" r="88" fill="none" stroke="#E2AA54" stroke-width="2"/>
    <circle cx="100" cy="100" r="70" fill="none" stroke="#E2AA54" stroke-width="1" opacity="0.5"/>
    <!-- Arced top text -->
    <defs>
      <path id="arcTop3" d="M 20 100 A 80 80 0 0 1 180 100" />
      <path id="arcBot3" d="M 20 100 A 80 80 0 0 0 180 100" />
    </defs>
    <text font-family="Outfit, sans-serif" font-size="14" font-weight="600" letter-spacing="6" fill="#E2AA54">
      <textPath href="#arcTop3" startOffset="50%" text-anchor="middle">SHAWN POWER</textPath>
    </text>
    <text font-family="Outfit, sans-serif" font-size="10" font-weight="500" letter-spacing="5" fill="#E2AA54">
      <textPath href="#arcBot3" startOffset="50%" text-anchor="middle">MAYOR · MIRAMICHI</textPath>
    </text>
    <!-- Center mark: stylized river wave + star -->
    <path d="M 45 110 Q 70 95 100 110 T 155 110" fill="none" stroke="#CC5A37" stroke-width="3" stroke-linecap="round"/>
    <path d="M 50 122 Q 75 107 100 122 T 150 122" fill="none" stroke="#CC5A37" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <!-- Star -->
    <polygon points="100,70 106,88 125,88 110,100 115,118 100,107 85,118 90,100 75,88 94,88" fill="#E2AA54"/>
  </g>
  <!-- Side wordmark -->
  <g transform="translate(320, 55)">
    <text x="0" y="30" font-family="Outfit, sans-serif" font-size="14" font-weight="500" letter-spacing="8" fill="#1E392A">SHAWN</text>
    <text x="0" y="80" font-family="Playfair Display, Georgia, serif" font-size="48" font-weight="700" fill="#1E392A">POWER</text>
    <line x1="0" y1="94" x2="210" y2="94" stroke="#CC5A37" stroke-width="2"/>
    <text x="0" y="118" font-family="Outfit, sans-serif" font-size="12" font-weight="500" letter-spacing="6" fill="#CC5A37">FOR MAYOR · MIRAMICHI</text>
  </g>
</svg>
