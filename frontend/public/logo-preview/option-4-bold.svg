<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <!-- Abstract energy mark: three ascending bars / arrow forward -->
  <g transform="translate(40, 60)">
    <rect x="0" y="40" width="18" height="60" rx="3" fill="#1E392A"/>
    <rect x="28" y="20" width="18" height="80" rx="3" fill="#CC5A37"/>
    <rect x="56" y="0" width="18" height="100" rx="3" fill="#E2AA54"/>
  </g>
  <!-- Wordmark — dominant POWER -->
  <g transform="translate(150, 50)">
    <text x="0" y="30" font-family="Outfit, sans-serif" font-size="18" font-weight="500" letter-spacing="12" fill="#1E392A">SHAWN</text>
    <text x="0" y="110" font-family="Outfit, sans-serif" font-size="96" font-weight="800" letter-spacing="-2" fill="#CC5A37">POWER</text>
    <text x="0" y="140" font-family="Outfit, sans-serif" font-size="14" font-weight="600" letter-spacing="10" fill="#1E392A">FOR MAYOR OF MIRAMICHI</text>
  </g>
</svg>
