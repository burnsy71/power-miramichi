<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
  <defs>
    <style>
      .green { fill: #1E392A; }
      .orange { fill: #CC5A37; }
      .gold { fill: #E2AA54; }
      .serif { font-family: 'Playfair Display', 'Georgia', serif; }
      .sans { font-family: 'Outfit', 'Inter', 'Helvetica Neue', sans-serif; }
    </style>
  </defs>
  <!-- Monogram shield -->
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="140" height="140" rx="18" class="green"/>
    <rect x="6" y="6" width="128" height="128" rx="12" fill="none" stroke="#E2AA54" stroke-width="2"/>
    <text x="70" y="102" text-anchor="middle" class="serif" font-size="96" font-weight="700" fill="#E2AA54">SP</text>
  </g>
  <!-- Wordmark -->
  <g transform="translate(190, 0)">
    <text x="0" y="60" class="sans" font-size="20" font-weight="500" letter-spacing="6" fill="#1E392A">SHAWN</text>
    <text x="0" y="118" class="serif" font-size="62" font-weight="700" fill="#1E392A">POWER</text>
    <line x1="0" y1="134" x2="360" y2="134" stroke="#CC5A37" stroke-width="2"/>
    <text x="0" y="160" class="sans" font-size="13" font-weight="500" letter-spacing="8" fill="#CC5A37">FOR MAYOR · MIRAMICHI</text>
  </g>
</svg>
