<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <!-- Crest / shield with laurel — classic political -->
  <g transform="translate(50, 15)">
    <!-- Shield -->
    <path d="M 80 0 L 160 0 L 160 100 Q 160 180 80 200 Q 0 180 0 100 L 0 0 Z" fill="#1E392A"/>
    <path d="M 80 10 L 150 10 L 150 100 Q 150 170 80 188 Q 10 170 10 100 L 10 10 Z" fill="none" stroke="#E2AA54" stroke-width="2"/>
    <!-- Banner in shield -->
    <text x="80" y="80" text-anchor="middle" font-family="Playfair Display, Georgia, serif" font-size="52" font-weight="700" fill="#E2AA54">P</text>
    <!-- Divider line -->
    <line x1="30" y1="100" x2="130" y2="100" stroke="#CC5A37" stroke-width="2"/>
    <!-- Tagline -->
    <text x="80" y="125" text-anchor="middle" font-family="Outfit, sans-serif" font-size="10" font-weight="600" letter-spacing="3" fill="#E2AA54">POWER</text>
    <text x="80" y="145" text-anchor="middle" font-family="Outfit, sans-serif" font-size="8" font-weight="500" letter-spacing="2" fill="#E2AA54">FOR MAYOR</text>
    <!-- Year -->
    <text x="80" y="175" text-anchor="middle" font-family="Outfit, sans-serif" font-size="9" font-weight="600" letter-spacing="3" fill="#CC5A37">MIRAMICHI</text>
  </g>
  <!-- Side wordmark -->
  <g transform="translate(240, 60)">
    <text x="0" y="30" font-family="Outfit, sans-serif" font-size="16" font-weight="500" letter-spacing="10" fill="#1E392A">SHAWN</text>
    <text x="0" y="90" font-family="Playfair Display, Georgia, serif" font-size="56" font-weight="700" fill="#1E392A">POWER</text>
    <line x1="0" y1="105" x2="280" y2="105" stroke="#CC5A37" stroke-width="2"/>
    <text x="0" y="130" font-family="Outfit, sans-serif" font-size="13" font-weight="500" letter-spacing="7" fill="#CC5A37">FOR MAYOR · MIRAMICHI</text>
  </g>
</svg>
